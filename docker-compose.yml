services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend/prisma:/app/prisma
      - ./backend/src:/app/src
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - PORT=3001
      - FRONTEND_ORIGIN=http://localhost:3000
    command: >
      sh -c "npx prisma generate &&
             npx prisma db push &&
             npm run prisma:seed &&
             npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    command: >
      sh -c "npm run dev -- --host 0.0.0.0 --port 3000"
